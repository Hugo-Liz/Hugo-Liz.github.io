  # Projects
  - title: 项目经历
    layout: list
    content:

      - layout: left
        title: DAMP数据资产管理平台
        sub_title: 中建八局第三建设有限公司
        caption: 2024.01 - 2024.11
        description: |
          **项目背景：** 解决公司内部数据孤岛严重、重复录入与功能冗余等问题，构建统一资产目录与数据集市共享机制。

          **主要工作：**
          - 负责工程管理、财务、技术质量等核心模块的L4层级业务资产梳理。
          - 设计指标资产体系（原子/派生/复合指标），推动业务方确认数据标准。
          - 拉通集团主数据体系，将项目数据重复填报次数从3次压缩至1次。
          - 主导设计平台6大核心模块：业务资产、指标资产、技术资产、数据标准、资产看板及数据集市。

          **项目成果：** 减少信息化开发成本300万元；主数据填报流程压缩67%；年节省人力工时1,200+小时；覆盖1,200+业务实体/指标资产，支撑95%部门数据共享需求。

