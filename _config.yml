        title: 文化遗产数字化平台建设项目
        sub_title: 雨花台烈士陵园管理局
        caption: 2022.12 - 2023.08
        description: |
          **项目背景：** 通过数字化存储、全文检索、数据分析与知识挖掘，解决海量烈士文献资料难以利用的问题。

          **主要工作：**
          - 主导投标文件技术方案编写与评审，成功助力项目中标（创收827万元）。
          - 主导系统功能设计，精准定义数据检索子系统、专家智库系统、藏品管理系统核心需求。
          - 利用Axure产出可交互原型，构建系统知识图谱，极大提升用户资源检索效率。
          - 在后续新四军纪念馆项目中取得3个地方性标准。

      - layout: left
        title: 江苏省公共图书馆在线学习平台
        sub_title: 江苏省图书馆
        caption: 2022.12 - 2023.05
        description: |
          **项目背景：** 为提升江苏省图书馆从业人员业务能力，搭建省级学习平台，集成课程资源、培训活动、在线测评等功能。

          **主要工作：**
          - 通过深度用户访谈，梳理课程体系、在线测评及后台管理需求。
          - 设计模块化课程体系，主导在线评测系统全流程设计。
          - 构建三大数据看板（栏目访问/用户行为/资源使用），实现可视化分析。
          - 使用Axure RP输出高保真交互原型。

          **项目成果：** 实现40万元项目创收；以98%客户满意度赢得长期合作协议。

